<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Bill - 登录</title>
    <link rel="icon" href="img/logo.svg" type="image/svg+xml">
    <link rel="stylesheet" href="lib/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="css/app.css" media="all">
    <link rel="stylesheet" href="css/index.css" media="all">
</head>
<body>
<div class="login-container">
    <div class="login-left">
        <div class="login-brand">
            <img src="img/logo.svg" alt="Hello Bill Logo" class="login-logo">
            <div class="login-title">Hello Bill</div>
            <div class="login-subtitle">个人智能记账系统</div>
        </div>
    </div>
    <div class="login-right">
        <div class="login-form-wrapper">
            <div class="login-form-title">欢迎登录</div>
            <form class="layui-form layui-form-pane" lay-filter="loginForm">
                <div class="login-input-group">
                    <img src="img/user.svg" alt="" class="login-input-icon">
                    <input type="text" name="username" lay-verify="username" autocomplete="off"
                           placeholder="用户名" class="layui-input" id="username" autofocus>
                </div>
                <div class="login-input-group">
                    <img src="img/lock.svg" alt="" class="login-input-icon">
                    <input type="password" name="password" lay-verify="password" placeholder="密码"
                           autocomplete="off" class="layui-input" id="password">
                </div>
                <div class="login-btn-group">
                    <button type="submit" class="layui-btn login-btn" lay-submit="" lay-filter="login">登 录</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="lib/layui/layui.js" charset="utf-8"></script>
<script src="js/common.js" charset="utf-8"></script>
<script src="js/web.js" charset="utf-8"></script>
<script src="js/index.js" charset="utf-8"></script>
</body>
</html>
